<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste HTML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border: 1px solid #e3e8ef;
      border-radius: 12px;
      padding: 24px;
      max-width: 520px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      text-align: center;
    }
    h1 { margin-top: 0; }
    code {
      background: #f0f4ff;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Página de Teste</h1>
    <p>Este é um arquivo HTML de teste gerado automaticamente.</p>
    <p>Arquivo: <code>teste.html</code></p>
  </main>
</body>
</html>
